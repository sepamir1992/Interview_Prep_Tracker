<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--color-background-tertiary,#f5f5f3);color:var(--color-text-primary,#1a1a18);font-size:14px}
:root{--border:#e0ddd5;--bg:#fff;--bg2:#f5f5f3;--muted:#888;--purple:#534AB7;--purple-bg:#EEEDFE;--purple-light:#AFA9EC;--green:#1D9E75;--green-bg:#E1F5EE;--yellow-c:#BA7517;--yellow-bg:#FAEEDA;--red-c:#A32D2D;--red-bg:#FCEBEB;--blue-c:#185FA5;--blue-bg:#E3EEF7}
.app{max-width:720px;margin:0 auto;padding:16px}
.header{margin-bottom:16px}
.title{font-size:17px;font-weight:500;margin-bottom:4px}
.subtitle{font-size:12px;color:var(--muted)}
.stats-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.pill{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:var(--bg2);color:var(--muted)}
.pill-green{background:var(--green-bg);color:#085041}
.pill-yellow{background:var(--yellow-bg);color:#633806}
.pill-red{background:var(--red-bg);color:var(--red-c)}
.pill-purple{background:var(--purple-bg);color:var(--purple)}
.pill-blue{background:var(--blue-bg);color:var(--blue-c)}
.topic-nav{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.nav-btn{width:32px;height:32px;border-radius:8px;border:0.5px solid var(--border);background:transparent;cursor:pointer;font-size:16px;color:var(--color-text-primary,#1a1a18);display:flex;align-items:center;justify-content:center}
.nav-btn:disabled{opacity:0.3;cursor:not-allowed}
.topic-title{flex:1;text-align:center;font-size:14px;font-weight:500}
.topic-title small{font-size:11px;color:var(--muted);display:block;margin-top:2px;font-weight:400}
.dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.dot{width:26px;height:26px;border-radius:50%;border:1.5px solid transparent;font-size:10px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--bg2);color:var(--muted)}
.dot-f{background:var(--purple);color:#fff;border-color:var(--purple)}
.dot-f1{background:#9FE1CB;color:#085041;border-color:var(--green)}
.dot-f2{background:#97C459;color:#173404;border-color:#3B6D11}
.dot-f3{background:#EF9F27;color:#412402;border-color:#854F0B}
.dot-f4{background:#F0997B;color:#4A1B0C;border-color:#993C1D}
.dot-f5{background:#E8C467;color:#4A3610;border-color:#8B6B14}
.cards{display:flex;flex-direction:column;gap:12px}
.card{background:var(--bg);border:0.5px solid var(--border);border-left:3px solid var(--border);border-radius:10px;overflow:hidden}
.card-green{border-left-color:var(--green)}
.card-yellow{border-left-color:#EF9F27}
.card-red{border-left-color:#E24B4A}
.card-purple{border-left-color:var(--purple)}
.card-blue{border-left-color:var(--blue-c)}
.card-head{padding:12px 14px 0;display:flex;align-items:flex-start;gap:8px}
.prob-n{font-size:11px;font-weight:600;color:var(--muted);min-width:42px;padding-top:1px}
.problem-name{font-size:13px;font-weight:500;flex:1;line-height:1.3}
.diff-badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px}
.diff-E{background:#EAF3DE;color:#27500A}
.diff-M{background:#FAEEDA;color:#633806}
.diff-H{background:#FCEBEB;color:#791F1F}
.card-links{padding:6px 14px 8px;display:flex;gap:6px;flex-wrap:wrap}
.link-btn{font-size:11px;padding:3px 10px;border-radius:4px;border:0.5px solid var(--border);color:var(--muted);text-decoration:none;background:var(--bg2)}
.link-btn:hover{color:var(--color-text-primary,#1a1a18);background:var(--bg)}
.prem-badge{font-size:10px;padding:1px 5px;border-radius:3px;background:#FAEEDA;color:#633806;margin-left:4px}
.section{padding:0 14px 12px}
.section-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;margin-top:10px}
.divider{height:0.5px;background:var(--border);margin:0 14px}
.row{display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
select.ctrl{font-size:12px;padding:4px 8px;border-radius:6px;border:0.5px solid var(--border);background:var(--bg2);color:var(--color-text-primary,#1a1a18);cursor:pointer;flex:1}
.color-btn{flex:1;font-size:12px;padding:4px 0;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .1s}
.color-btn.active-green{background:var(--green-bg);border-color:var(--green)}
.color-btn.active-yellow{background:var(--yellow-bg);border-color:#EF9F27}
.color-btn.active-red{background:var(--red-bg);border-color:#E24B4A}
.conf-btn{width:22px;height:22px;border-radius:50%;border:0.5px solid var(--border);background:var(--bg2);color:var(--muted);font-size:10px;cursor:pointer;font-weight:500;display:flex;align-items:center;justify-content:center;padding:0}
.conf-btn.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.cb-row{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);cursor:pointer}
.cb-row input{accent-color:var(--purple);cursor:pointer}
.time-input{width:52px;font-size:12px;padding:3px 6px;border-radius:6px;border:0.5px solid var(--border);background:var(--bg2);color:var(--color-text-primary,#1a1a18)}
.notes-toggle{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;margin-bottom:4px;margin-top:4px}
.notes-toggle:hover{color:var(--color-text-primary,#1a1a18)}
textarea.notes{width:100%;font-size:12px;padding:8px;border-radius:6px;border:0.5px solid var(--border);background:var(--bg2);color:var(--color-text-primary,#1a1a18);resize:vertical;min-height:90px;font-family:inherit;line-height:1.5;margin-top:4px}
.concept-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;font-size:12px;border-bottom:0.5px dashed var(--border)}
.concept-row:last-child{border-bottom:0}
.concept-row input[type="checkbox"]{accent-color:var(--purple);cursor:pointer;margin-top:2px;flex-shrink:0}
.concept-row .c-name{font-weight:500;color:var(--color-text-primary,#1a1a18);line-height:1.4}
.concept-row .c-desc{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.concept-row.done .c-name{color:var(--muted);text-decoration:line-through}
.concept-body{flex:1}
.phase-badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;margin-left:6px}
.topic-header-card{background:var(--bg);border:0.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.topic-intro{font-size:12px;color:var(--muted);line-height:1.5;margin-top:6px}
.progress-bar{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-top:10px}
.progress-fill{height:100%;background:var(--purple);border-radius:2px;transition:width .3s}
.design-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;font-size:12px;border-bottom:0.5px dashed var(--border)}
.design-item:last-child{border-bottom:0}
.design-item input[type="checkbox"]{accent-color:var(--purple);cursor:pointer;margin-top:2px;flex-shrink:0}
.design-item .d-name{font-weight:500;color:var(--color-text-primary,#1a1a18)}
.design-item.done .d-name{color:var(--muted);text-decoration:line-through}
.design-status{font-size:11px;padding:2px 6px;border-radius:4px;border:0.5px solid var(--border);background:var(--bg2);color:var(--muted);margin-left:auto}
</style>
</head>

      {n:371,name:'Sum of Two Integers',diff:'M',lc:'https://leetcode.com/problems/sum-of-two-integers/',nc:'https://neetcode.io/problems/sum-of-two-integers'},
      {n:7,name:'Reverse Integer',diff:'M',lc:'https://leetcode.com/problems/reverse-integer/',nc:'https://neetcode.io/problems/reverse-integer'},
    ],
    design:[
      {name:'Bitmask DP & compact state',desc:'Representing feature sets or visited nodes'},
      {name:'Feature flags and configuration',desc:'Packed config representation'},
      {name:'Checksums and error detection',desc:'CRC, parity, hashing'},
      {name:'Bloom filters',desc:'Probabilistic set membership'},
    ],
  },
  {
    id:18,name:'Math & Geometry',phase:'Numerics',
    intro:'A grab-bag. Matrix manipulation, modular arithmetic, and a few classics that every candidate is expected to know.',
    concepts:[
      {name:'Matrix manipulation',desc:'Rotate in place, transpose'},
      {name:'Spiral traversal',desc:'Boundary-shrinking pattern'},
      {name:'Modular arithmetic',desc:'(a + b) % m, (a * b) % m, negative mod'},
      {name:'Fast exponentiation',desc:'O(log n) pow via squaring'},
      {name:'Coordinate geometry',desc:'Distance, slope, squares/rectangles'},
      {name:'Cycle detection in numbers',desc:'Happy number — Floyd applies'},
    ],
    problems:[
      {n:48,name:'Rotate Image',diff:'M',lc:'https://leetcode.com/problems/rotate-image/',nc:'https://neetcode.io/problems/rotate-matrix'},
      {n:54,name:'Spiral Matrix',diff:'M',lc:'https://leetcode.com/problems/spiral-matrix/',nc:'https://neetcode.io/problems/spiral-matrix'},
      {n:73,name:'Set Matrix Zeroes',diff:'M',lc:'https://leetcode.com/problems/set-matrix-zeroes/',nc:'https://neetcode.io/problems/set-zeroes-in-matrix'},
      {n:202,name:'Happy Number',diff:'E',lc:'https://leetcode.com/problems/happy-number/',nc:'https://neetcode.io/problems/non-cycical-number'},
      {n:66,name:'Plus One',diff:'E',lc:'https://leetcode.com/problems/plus-one/',nc:'https://neetcode.io/problems/plus-one'},
      {n:50,name:'Pow(x, n)',diff:'M',lc:'https://leetcode.com/problems/powx-n/',nc:'https://neetcode.io/problems/pow-x-n'},
      {n:43,name:'Multiply Strings',diff:'M',lc:'https://leetcode.com/problems/multiply-strings/',nc:'https://neetcode.io/problems/multiply-strings'},
      {n:2013,name:'Detect Squares',diff:'M',lc:'https://leetcode.com/problems/detect-squares/',nc:'https://neetcode.io/problems/count-squares'},
    ],
    design:[
      {name:'Coordinate systems & transforms',desc:'Where math meets engineering'},
      {name:'Modular hashing',desc:'Hash-table uniformity, consistent hashing'},
      {name:'Geohashing / spatial indexing',desc:'Location-based services'},
      {name:'Randomization & sampling',desc:'Reservoir sampling, weighted choice'},
    ],
  },
];

const PHASES=['Foundations','Search & Scan','Trees','Recursion & Graphs','DP & Optimization','Numerics'];
const PHASE_COLORS=['#534AB7','#1D9E75','#3B6D11','#D85A30','#BA7517','#8B6B14'];
const DOT_CLASSES=['dot-f','dot-f1','dot-f2','dot-f3','dot-f4','dot-f5'];

// =============================================================
// STATE & STORAGE
// =============================================================
function defTopicState(topic){
  const s={problems:{},concepts:{},design:{},notes:'',conceptNotes:'',designNotes:''};
  topic.problems.forEach(p=>{
    s.problems[p.n]={status:'Not Started',color:null,conf:0,time:'',notes:'',timed:false,explain:false,redo:false};
  });
  topic.concepts.forEach((c,i)=>{s.concepts[i]=false;});
  topic.design.forEach((d,i)=>{s.design[i]={checked:false,status:'Not Started'};});
  return s;
}

const KEY=t=>`ip_topic_${t}`;
async function load(t){try{const r=await window.storage.get(KEY(t));return r?JSON.parse(r.value):null;}catch{return null;}}
async function save(t,v){try{await window.storage.set(KEY(t),JSON.stringify(v));}catch{}}

let CT=1, DATA=null, EXP={}, timers={};

function getTopic(){return TOPICS[CT-1];}
function get(){return DATA;}
function patch(obj){
  DATA={...DATA,...obj};
  render();
  clearTimeout(timers[CT]);
  timers[CT]=setTimeout(()=>save(CT,DATA),400);
}
function patchProblem(n,obj){
  DATA.problems[n]={...DATA.problems[n],...obj};
  render();
  clearTimeout(timers[CT]);
  timers[CT]=setTimeout(()=>save(CT,DATA),400);
}
function patchConcept(i,v){
  DATA.concepts[i]=v;
  render();
  clearTimeout(timers[CT]);
  timers[CT]=setTimeout(()=>save(CT,DATA),400);
}
function patchDesign(i,obj){
  DATA.design[i]={...DATA.design[i],...obj};
  render();
  clearTimeout(timers[CT]);
  timers[CT]=setTimeout(()=>save(CT,DATA),400);
}

async function loadTopic(t){
  const topic=TOPICS[t-1];
  const saved=await load(t);
  const defs=defTopicState(topic);
  if(saved){
    // merge shallow; handle new problems/concepts/design added later
    DATA={...defs,...saved,
      problems:{...defs.problems,...(saved.problems||{})},
      concepts:{...defs.concepts,...(saved.concepts||{})},
      design:{...defs.design,...(saved.design||{})}};
  } else {
    DATA=defs;
  }
  render();
}

// =============================================================
// RENDERING
// =============================================================
function diffBadge(d){const m={'E':'Easy','M':'Medium','H':'Hard'};return`<span class="diff-badge diff-${d}">${m[d]||d}</span>`;}

function renderTopicHeader(topic){
  const phaseIdx=PHASES.indexOf(topic.phase);
  const color=PHASE_COLORS[phaseIdx];
  const totalP=topic.problems.length;
  const solvedP=Object.values(DATA.problems).filter(p=>p.status==='Solved Cleanly').length;
  const pct=totalP>0?Math.round(100*solvedP/totalP):0;
  return`<div class="topic-header-card">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span class="pill pill-purple">Topic ${topic.id}/18</span>
      <span class="phase-badge" style="background:${color};color:#fff">${topic.phase}</span>
      <span style="font-size:11px;color:var(--muted);margin-left:auto">${solvedP}/${totalP} solved cleanly</span>
    </div>
    <div class="topic-intro">${topic.intro}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}

function renderConcepts(topic){
  const rows=topic.concepts.map((c,i)=>{
    const done=DATA.concepts[i];
    return`<div class="concept-row${done?' done':''}">
      <input type="checkbox" ${done?'checked':''} onchange="patchConcept(${i},this.checked)">
      <div class="concept-body">
        <div class="c-name">${c.name}</div>
        <div class="c-desc">${c.desc}</div>
      </div>
    </div>`;
  }).join('');
  const k='concepts-n';
  return`<div class="card card-purple">
    <div class="section">
      <div class="section-label" style="margin-top:14px">🗺️ Concepts to Learn</div>
      ${rows}
      <button class="notes-toggle" onclick="toggleExp('${k}')">${EXP[k]?'▼':'▶'} Concept notes</button>
      ${EXP[k]?`<textarea class="notes" placeholder="What clicked · Mental models · Things I keep forgetting · Questions to revisit..." oninput="patch({conceptNotes:this.value})">${DATA.conceptNotes||''}</textarea>`:''}
    </div>
  </div>`;
}

function renderProblem(p){
  const s=DATA.problems[p.n]||{status:'Not Started',color:null,conf:0,time:'',notes:'',timed:false,explain:false,redo:false};
  const border=s.color==='green'?'card-green':s.color==='yellow'?'card-yellow':s.color==='red'?'card-red':'';
  const k=`p${p.n}-n`;
  return`<div class="card ${border}">
    <div class="card-head">
      <span class="prob-n">#${p.n}</span>
      <span class="problem-name">${p.name}${p.prem?'<span class="prem-badge">Premium</span>':''}</span>
      ${diffBadge(p.diff)}
    </div>
    <div class="card-links">
      <a class="link-btn" href="${p.lc}" target="_blank" rel="noopener">LeetCode</a>
      ${p.nc?`<a class="link-btn" href="${p.nc}" target="_blank" rel="noopener">🎥 NeetCode</a>`:''}
    </div>
    <div class="section">
      <div class="row">
        <select class="ctrl" onchange="patchProblem(${p.n},{status:this.value})">
          ${['Not Started','In Progress','Solved with Hints','Solved Cleanly','Review Needed'].map(v=>`<option${s.status===v?' selected':''}>${v}</option>`).join('')}
        </select>
      </div>
      <div class="row">
        ${[['green','🟢'],['yellow','🟡'],['red','🔴']].map(([c,e])=>`<button class="color-btn${s.color===c?' active-'+c:''}" onclick="patchProblem(${p.n},{color:${s.color===c?'null':"'"+c+"'"}})">${e}</button>`).join('')}
      </div>
      <div class="row" style="gap:5px">
        <span style="font-size:11px;color:var(--muted);margin-right:2px">Conf</span>
        ${[1,2,3,4,5].map(i=>`<button class="conf-btn${i<=s.conf?' active':''}" onclick="patchProblem(${p.n},{conf:${s.conf===i?0:i}})">${i}</button>`).join('')}
        <input class="time-input" type="number" placeholder="min" value="${s.time||''}" oninput="patchProblem(${p.n},{time:this.value})" style="margin-left:8px">
        <span style="font-size:11px;color:var(--muted)">min</span>
      </div>
      <div class="row" style="gap:12px;flex-wrap:wrap">
        <label class="cb-row"><input type="checkbox" ${s.timed?'checked':''} onchange="patchProblem(${p.n},{timed:this.checked})"> Timed</label>
        <label class="cb-row"><input type="checkbox" ${s.explain?'checked':''} onchange="patchProblem(${p.n},{explain:this.checked})"> Can explain</label>
        <label class="cb-row"><input type="checkbox" ${s.redo?'checked':''} onchange="patchProblem(${p.n},{redo:this.checked})"> Need redo</label>
      </div>
      <button class="notes-toggle" onclick="toggleExp('${k}')">${EXP[k]?'▼':'▶'} Problem notes</button>
      ${EXP[k]?`<textarea class="notes" placeholder="My approach · Why it worked/failed · Key insight · What to remember next time..." oninput="patchProblem(${p.n},{notes:this.value})">${s.notes||''}</textarea>`:''}
    </div>
  </div>`;
}

function renderDesign(topic){
  const rows=topic.design.map((d,i)=>{
    const s=DATA.design[i]||{checked:false,status:'Not Started'};
    return`<div class="design-item${s.checked?' done':''}">
      <input type="checkbox" ${s.checked?'checked':''} onchange="patchDesign(${i},{checked:this.checked})">
      <div class="concept-body">
        <div class="d-name">${d.name}</div>
        <div class="c-desc">${d.desc}</div>
      </div>
      <select class="design-status" onchange="patchDesign(${i},{status:this.value})">
        ${['Not Started','In Progress','Understood','Needs Review'].map(v=>`<option${s.status===v?' selected':''}>${v}</option>`).join('')}
      </select>
    </div>`;
  }).join('');
  const k='design-n';
  return`<div class="card card-blue">
    <div class="section">
      <div class="section-label" style="margin-top:14px">🏗️ System Design — Paired Concepts</div>
      ${rows}
      <button class="notes-toggle" onclick="toggleExp('${k}')">${EXP[k]?'▼':'▶'} Design notes</button>
      ${EXP[k]?`<textarea class="notes" placeholder="Definition in my own words · Tradeoffs · Real product example · What's still fuzzy..." oninput="patch({designNotes:this.value})">${DATA.designNotes||''}</textarea>`:''}
    </div>
  </div>`;
}

function computeOverallStats(){
  // Stats across current topic
  let solved=0,inprog=0,green=0,yellow=0,red=0;
  Object.values(DATA.problems).forEach(s=>{
    if(s.status==='Solved Cleanly')solved++;
    if(s.status==='In Progress')inprog++;
    if(s.color==='green')green++;
    if(s.color==='yellow')yellow++;
    if(s.color==='red')red++;
  });
  const cLearned=Object.values(DATA.concepts).filter(v=>v).length;
  const cTotal=Object.keys(DATA.concepts).length;
  return{solved,inprog,green,yellow,red,cLearned,cTotal};
}

function render(){
  if(!DATA){document.getElementById('root').innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">Loading...</div>';return;}
  const topic=getTopic();
  const st=computeOverallStats();

  let html=`<div class="header">
    <div class="title">Interview Prep Tracker</div>
    <div class="subtitle">NeetCode Roadmap · DSA + System Design</div>
    <div class="stats-row">
      <span class="pill pill-purple">${topic.name}</span>
      <span class="pill pill-green">${st.solved}/${topic.problems.length} solved</span>
      <span class="pill pill-blue">${st.cLearned}/${st.cTotal} concepts</span>
      ${st.green?`<span class="pill pill-green">${st.green} 🟢</span>`:''}
      ${st.yellow?`<span class="pill pill-yellow">${st.yellow} 🟡</span>`:''}
      ${st.red?`<span class="pill pill-red">${st.red} 🔴</span>`:''}
    </div>
  </div>

  <div class="topic-nav">
    <button class="nav-btn" onclick="goTopic(${CT-1})" ${CT===1?'disabled':''}>←</button>
    <div class="topic-title">${topic.name}<small>Topic ${CT} of 18 · ${topic.phase}</small></div>
    <button class="nav-btn" onclick="goTopic(${CT+1})" ${CT===18?'disabled':''}>→</button>
  </div>

  <div class="dots">
    ${TOPICS.map(t=>{
      const pi=PHASES.indexOf(t.phase);
      const cls=t.id===CT?DOT_CLASSES[pi]:'';
      return`<button class="dot ${cls}" onclick="goTopic(${t.id})" title="${t.id}. ${t.name}">${t.id}</button>`;
    }).join('')}
  </div>

  ${renderTopicHeader(topic)}

  <div class="cards">
    ${renderConcepts(topic)}
    <div class="section-label" style="padding:0 4px;margin-top:4px;margin-bottom:-4px">📝 Problems (${topic.problems.length})</div>
    ${topic.problems.map(renderProblem).join('')}
    ${renderDesign(topic)}
  </div>`;

  document.getElementById('root').innerHTML=html;
}

function toggleExp(k){EXP[k]=!EXP[k];render();}
function goTopic(t){if(t<1||t>18)return;CT=t;EXP={};loadTopic(t);}

loadTopic(1);
</script>
</body>
</html>
