<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Interview Prep Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── reset / root ────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{font-family:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;line-height:1.45;color:var(--ink);background:var(--bg);transition:background .25s ease,color .25s ease;overflow-x:hidden}
:root{
  --bg:#FAF8F2;--surface:#FFFFFF;--surface-2:#F4F1E8;--surface-3:#EDE9DC;
  --ink:#1C1B1A;--ink-2:#3A3833;--muted:#7A766D;--muted-2:#9C988E;
  --border:#E5E0D2;--border-strong:#D5CFBE;
  --accent:#534AB7;--accent-bg:#EEEDFE;--accent-soft:#C9C5F2;
  --green:#1D9E75;--green-bg:#E1F5EE;--green-soft:#9FE1CB;--green-deep:#0F6E50;
  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-soft:#EFC58A;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-soft:#E8A4A4;
  --blue:#185FA5;--blue-bg:#E3EEF7;--blue-soft:#9DC1E0;
  --shadow-sm:0 1px 2px rgba(28,27,26,.04),0 1px 1px rgba(28,27,26,.03);
  --shadow:0 2px 8px rgba(28,27,26,.04),0 1px 2px rgba(28,27,26,.03);
  --shadow-lg:0 8px 28px rgba(28,27,26,.08),0 2px 6px rgba(28,27,26,.04);
  --radius-sm:6px;--radius:10px;--radius-lg:14px;
  --heat-0:#F0ECE0;--heat-1:#D6EAD8;--heat-2:#9ED3B4;--heat-3:#4DAE85;--heat-4:#1D8A60;
}
[data-theme="dark"]{
  --bg:#141416;--surface:#1C1C1F;--surface-2:#252528;--surface-3:#2E2E32;
  --ink:#EFEDE6;--ink-2:#C9C6BD;--muted:#8F8C84;--muted-2:#6E6B64;
  --border:#2D2D32;--border-strong:#3D3D43;
  --accent:#9D96E8;--accent-bg:#272346;--accent-soft:#534AB7;
  --green:#4FD1A6;--green-bg:#143028;--green-soft:#1D9E75;--green-deep:#7FE0BC;
  --amber:#E8B068;--amber-bg:#2E2616;--amber-soft:#BA7517;
  --red:#E88A8A;--red-bg:#2E1818;--red-soft:#A32D2D;
  --blue:#7FB5DD;--blue-bg:#152434;--blue-soft:#185FA5;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --shadow:0 2px 8px rgba(0,0,0,.35);
  --shadow-lg:0 8px 28px rgba(0,0,0,.5);
  --heat-0:#1F1F22;--heat-1:#1F3027;--heat-2:#225B41;--heat-3:#2E9670;--heat-4:#5FCFA0;
}
::selection{background:var(--accent-bg);color:var(--accent)}
/* ─── layout ──────────────────────────────────────────────── */
.app{max-width:780px;margin:0 auto;padding:18px 16px 80px}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.brand{flex:1;min-width:0}
.brand-title{font-family:'Instrument Serif',serif;font-size:26px;font-weight:400;letter-spacing:-0.01em;line-height:1;color:var(--ink)}
.brand-title em{font-style:italic;color:var(--accent)}
.brand-sub{font-size:11px;color:var(--muted);letter-spacing:0.04em;text-transform:uppercase;margin-top:4px;font-weight:500}
.icon-btn{width:34px;height:34px;border-radius:9px;border:0.5px solid var(--border);background:var(--surface);color:var(--ink-2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s ease;flex-shrink:0;font-size:14px}
.icon-btn:hover{background:var(--surface-2);border-color:var(--border-strong)}
.icon-btn:active{transform:scale(0.96)}
.icon-btn svg{width:16px;height:16px}
/* ─── tabs ────────────────────────────────────────────────── */
.tabs{display:flex;gap:2px;background:var(--surface-2);padding:3px;border-radius:10px;margin-bottom:18px;border:0.5px solid var(--border)}
.tab{flex:1;font-family:inherit;font-size:13px;font-weight:500;padding:8px 4px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:7px;transition:all .15s ease;letter-spacing:0.01em}
.tab:hover{color:var(--ink-2)}
.tab.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm)}
/* ─── pills / badges ──────────────────────────────────────── */
.pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;background:var(--surface-2);color:var(--muted);letter-spacing:0.01em;white-space:nowrap}
.pill-green{background:var(--green-bg);color:var(--green-deep)}
.pill-amber{background:var(--amber-bg);color:#5F3B0A}
.pill-red{background:var(--red-bg);color:#791F1F}
.pill-accent{background:var(--accent-bg);color:var(--accent)}
.pill-blue{background:var(--blue-bg);color:var(--blue)}
[data-theme="dark"] .pill-amber{color:var(--amber)}
[data-theme="dark"] .pill-red{color:var(--red)}
[data-theme="dark"] .pill-green{color:var(--green-deep)}
/* ─── card ────────────────────────────────────────────────── */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
.card+.card{margin-top:12px}
.card-pad{padding:16px}
.card-title{font-family:'Instrument Serif',serif;font-size:19px;font-weight:400;letter-spacing:-0.005em;color:var(--ink)}
.card-title em{font-style:italic;color:var(--accent)}
.card-sub{font-size:11px;color:var(--muted);letter-spacing:0.04em;text-transform:uppercase;font-weight:500;margin-bottom:10px}
.section-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin:0 0 10px}
/* ─── hero / today view ───────────────────────────────────── */
.hero{padding:20px 18px;background:linear-gradient(180deg,var(--surface) 0%,var(--surface-2) 140%);border:0.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:14px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:-30px;right:-30px;width:140px;height:140px;background:radial-gradient(circle at center,var(--accent-bg) 0%,transparent 70%);pointer-events:none;opacity:0.6}
.hero-greeting{font-family:'Instrument Serif',serif;font-size:32px;font-weight:400;letter-spacing:-0.02em;line-height:1.05;color:var(--ink);margin-bottom:10px;position:relative}
.hero-greeting em{font-style:italic;color:var(--accent)}
.hero-line{font-size:13px;color:var(--muted);line-height:1.5;position:relative;max-width:520px}
.hero-line strong{color:var(--ink-2);font-weight:500}
.hero-stats{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px;position:relative}
/* ─── heatmap ─────────────────────────────────────────────── */
.heatmap-card{padding:14px 16px 16px}
.heatmap-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;gap:10px}
.heatmap-head h3{font-family:'Instrument Serif',serif;font-size:17px;font-weight:400;letter-spacing:-0.005em;color:var(--ink)}
.heatmap-meta{font-size:11px;color:var(--muted)}
.heatmap-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.heatmap-wrap::-webkit-scrollbar{height:4px}
.heatmap-wrap::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px}
.heatmap{display:grid;grid-template-rows:auto repeat(7,11px);grid-auto-flow:column;grid-auto-columns:11px;gap:2px;font-family:'IBM Plex Mono',monospace;min-width:max-content}
.hm-month{font-size:9px;color:var(--muted);font-weight:500;letter-spacing:0.05em;text-transform:uppercase;grid-row:1;height:14px;align-self:center;white-space:nowrap}
.hm-cell{width:11px;height:11px;border-radius:2px;background:var(--heat-0);transition:transform .15s ease;cursor:default}
.hm-cell.l1{background:var(--heat-1)}
.hm-cell.l2{background:var(--heat-2)}
.hm-cell.l3{background:var(--heat-3)}
.hm-cell.l4{background:var(--heat-4)}
.hm-cell.today{box-shadow:0 0 0 1.5px var(--accent)}
.hm-cell:hover{transform:scale(1.4);z-index:2;position:relative}
.hm-legend{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);margin-top:10px;letter-spacing:0.02em}
.hm-legend-cell{width:10px;height:10px;border-radius:2px}
/* ─── stat row ────────────────────────────────────────────── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.stat-tile{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 14px 12px;box-shadow:var(--shadow-sm)}
.stat-num{font-family:'Instrument Serif',serif;font-size:28px;font-weight:400;line-height:1;color:var(--ink);letter-spacing:-0.02em}
.stat-num em{font-style:italic;color:var(--accent)}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;font-weight:500;margin-top:6px}
.stat-trend{font-size:11px;color:var(--muted);margin-top:4px;font-family:'IBM Plex Mono',monospace}
.stat-trend.up{color:var(--green)}
/* ─── review queue ────────────────────────────────────────── */
.queue-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px dashed var(--border);cursor:pointer;transition:padding .15s ease}
.queue-row:last-child{border-bottom:0}
.queue-row:hover{padding-left:4px}
.queue-num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);min-width:40px;font-weight:500}
.queue-name{flex:1;font-size:13px;color:var(--ink);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.queue-topic{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;margin-top:1px}
.queue-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.queue-due{font-size:10px;color:var(--amber);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;font-family:'IBM Plex Mono',monospace}
.queue-due.overdue{color:var(--red)}
.queue-empty{padding:24px 12px;text-align:center;color:var(--muted);font-size:13px;font-style:italic;font-family:'Instrument Serif',serif;font-size:16px}
/* ─── topic nav (phase-grouped) ───────────────────────────── */
.phase-nav{margin-bottom:14px}
.phase-group{margin-bottom:8px}
.phase-group-label{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.phase-group-label::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--phase-color,var(--muted))}
.phase-dots{display:flex;gap:5px;flex-wrap:wrap}
.tdot{width:30px;height:30px;border-radius:8px;border:0.5px solid var(--border);background:var(--surface);font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s ease;position:relative;padding:0}
.tdot:hover{border-color:var(--border-strong);color:var(--ink-2)}
.tdot.done{background:var(--phase-color);color:#fff;border-color:var(--phase-color);opacity:0.55}
.tdot.partial{border-color:var(--phase-color);color:var(--phase-color)}
.tdot.partial::after{content:"";position:absolute;bottom:-1.5px;left:50%;transform:translateX(-50%);width:14px;height:2px;background:var(--phase-color);border-radius:1px;opacity:var(--frac,0.5)}
.tdot.current{background:var(--ink);color:var(--bg);border-color:var(--ink);box-shadow:0 0 0 2px var(--bg),0 0 0 3px var(--ink)}
[data-theme="dark"] .tdot.current{box-shadow:0 0 0 2px var(--bg),0 0 0 3px var(--ink)}
/* ─── topic header ────────────────────────────────────────── */
.topic-header{padding:18px}
.topic-header-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.topic-name{font-family:'Instrument Serif',serif;font-size:28px;font-weight:400;letter-spacing:-0.015em;line-height:1.05;color:var(--ink);margin-bottom:6px}
.topic-name em{font-style:italic;color:var(--accent)}
.topic-intro{font-size:13px;color:var(--muted);line-height:1.55;max-width:600px}
.topic-meta-row{display:flex;align-items:center;gap:14px;margin-top:14px;flex-wrap:wrap}
.topic-progress{flex:1;min-width:180px;display:flex;align-items:center;gap:10px}
.progress-track{flex:1;height:4px;background:var(--surface-2);border-radius:2px;overflow:hidden;position:relative}
.progress-fill{position:absolute;top:0;left:0;height:100%;background:var(--phase-color,var(--accent));border-radius:2px;transition:width .4s ease}
.progress-text{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);font-weight:500;white-space:nowrap}
.topic-arrows{display:flex;gap:5px}
/* ─── concepts ────────────────────────────────────────────── */
.concept-list{display:flex;flex-direction:column}
.concept-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;font-size:13px;border-bottom:0.5px dashed var(--border);transition:opacity .2s ease}
.concept-row:last-child{border-bottom:0}
.concept-row input[type="checkbox"]{accent-color:var(--accent);cursor:pointer;margin-top:2px;flex-shrink:0;width:14px;height:14px}
.c-name{font-weight:500;color:var(--ink);line-height:1.35}
.c-desc{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.4}
.concept-row.done .c-name{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--muted-2);text-decoration-thickness:1px}
.concept-row.done .c-desc{opacity:0.6}
.concept-body{flex:1;min-width:0}
/* ─── filter bar ──────────────────────────────────────────── */
.filter-bar{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:1px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.fchip{font-family:inherit;font-size:11.5px;font-weight:500;padding:5px 11px;border-radius:14px;border:0.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s ease;display:flex;align-items:center;gap:4px}
.fchip:hover{border-color:var(--border-strong);color:var(--ink-2)}
.fchip.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.fchip-count{font-family:'IBM Plex Mono',monospace;font-size:10px;opacity:0.7;font-weight:500}
/* ─── problem cards (collapsed by default) ────────────────── */
.problems-section{margin-top:6px}
.problems-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;padding:0 2px}
.problems-head h3{font-family:'Instrument Serif',serif;font-size:18px;font-weight:400;letter-spacing:-0.005em;color:var(--ink)}
.problems-head .pmeta{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.pcard{background:var(--surface);border:0.5px solid var(--border);border-left:2.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s ease}
.pcard+.pcard{margin-top:6px}
.pcard.col-green{border-left-color:var(--green)}
.pcard.col-yellow{border-left-color:var(--amber)}
.pcard.col-red{border-left-color:var(--red)}
.pcard.due{box-shadow:0 0 0 1px var(--amber-soft)}
.pcard-row{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.pcard-row:hover{background:var(--surface-2)}
.p-num{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:var(--muted);min-width:38px}
.p-name{flex:1;font-size:13px;font-weight:500;color:var(--ink);line-height:1.3;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-name.solved{color:var(--muted)}
.p-tags{display:flex;align-items:center;gap:6px;flex-shrink:0}
.diff-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;padding:1.5px 6px;border-radius:3px;letter-spacing:0.02em}
.diff-E{background:#EAF3DE;color:#27500A}
.diff-M{background:var(--amber-bg);color:#5F3B0A}
.diff-H{background:var(--red-bg);color:#791F1F}
[data-theme="dark"] .diff-E{background:#1B2A11;color:#9DD37C}
[data-theme="dark"] .diff-M{color:var(--amber)}
[data-theme="dark"] .diff-H{color:var(--red)}
.status-dot{width:9px;height:9px;border-radius:50%;background:var(--surface-3);border:1px solid var(--border-strong)}
.status-dot.s-prog{background:var(--amber);border-color:var(--amber)}
.status-dot.s-hint{background:var(--blue);border-color:var(--blue)}
.status-dot.s-clean{background:var(--green);border-color:var(--green)}
.status-dot.s-rev{background:var(--red);border-color:var(--red)}
.due-flag{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--amber);font-weight:600;letter-spacing:0.04em;text-transform:uppercase}
.expand-i{width:14px;height:14px;color:var(--muted);transition:transform .2s ease;flex-shrink:0}
.pcard.open .expand-i{transform:rotate(90deg)}
.pcard-body{display:none;padding:2px 14px 14px;border-top:0.5px solid var(--border)}
.pcard.open .pcard-body{display:block;animation:slideDown .25s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.pb-links{display:flex;gap:6px;flex-wrap:wrap;padding:10px 0 8px}
.link-btn{font-family:inherit;font-size:11.5px;font-weight:500;padding:4px 10px;border-radius:5px;border:0.5px solid var(--border);color:var(--ink-2);text-decoration:none;background:var(--surface-2);transition:all .15s ease;display:inline-flex;align-items:center;gap:4px}
.link-btn:hover{background:var(--surface);border-color:var(--border-strong);color:var(--ink)}
.prem-pill{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:1px 4px;border-radius:3px;background:var(--amber-bg);color:#5F3B0A;margin-left:6px;font-weight:600;letter-spacing:0.04em}
[data-theme="dark"] .prem-pill{color:var(--amber)}
.pb-row{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.pb-row label{font-size:11px;color:var(--muted);min-width:42px;font-weight:500}
.ctrl{font-family:inherit;font-size:12px;padding:5px 9px;border-radius:6px;border:0.5px solid var(--border);background:var(--surface-2);color:var(--ink);cursor:pointer;flex:1;min-width:0}
.ctrl:focus{outline:none;border-color:var(--accent);background:var(--surface)}
.color-grp{display:flex;gap:5px;flex:1}
.color-btn{flex:1;font-family:inherit;font-size:12px;padding:6px 0;border-radius:6px;border:0.5px solid var(--border);background:var(--surface-2);cursor:pointer;transition:all .12s ease;color:var(--ink-2)}
.color-btn:hover{border-color:var(--border-strong)}
.color-btn.act-green{background:var(--green-bg);border-color:var(--green);color:var(--green-deep)}
.color-btn.act-yellow{background:var(--amber-bg);border-color:var(--amber);color:#5F3B0A}
.color-btn.act-red{background:var(--red-bg);border-color:var(--red);color:#791F1F}
[data-theme="dark"] .color-btn.act-yellow{color:var(--amber)}
[data-theme="dark"] .color-btn.act-red{color:var(--red)}
.conf-grp{display:flex;gap:4px;align-items:center}
.conf-btn{width:28px;height:28px;border-radius:50%;border:0.5px solid var(--border);background:var(--surface-2);color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:all .12s ease}
.conf-btn:hover{border-color:var(--accent-soft)}
.conf-btn.act{background:var(--accent);color:#fff;border-color:var(--accent)}
.time-input{width:60px;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:5px 8px;border-radius:6px;border:0.5px solid var(--border);background:var(--surface-2);color:var(--ink)}
.time-input:focus{outline:none;border-color:var(--accent);background:var(--surface)}
.cb-grp{display:flex;gap:14px;flex-wrap:wrap;margin:8px 0}
.cb-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-2);cursor:pointer;font-weight:500}
.cb-row input{accent-color:var(--accent);cursor:pointer;width:14px;height:14px}
.notes-toggle{font-family:inherit;font-size:11.5px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:5px;font-weight:500}
.notes-toggle:hover{color:var(--ink-2)}
textarea.notes{width:100%;font-family:inherit;font-size:12.5px;padding:9px 10px;border-radius:7px;border:0.5px solid var(--border);background:var(--surface-2);color:var(--ink);resize:vertical;min-height:96px;line-height:1.5;margin-top:6px}
textarea.notes:focus{outline:none;border-color:var(--accent);background:var(--surface)}
/* ─── system design card ──────────────────────────────────── */
.dcard{padding:16px}
.dcard h3{font-family:'Instrument Serif',serif;font-size:18px;font-weight:400;letter-spacing:-0.005em;color:var(--ink);margin-bottom:2px}
.dcard h3 em{font-style:italic;color:var(--blue)}
.dcard-sub{font-size:11px;color:var(--muted);margin-bottom:12px}
.d-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;font-size:13px;border-bottom:0.5px dashed var(--border)}
.d-row:last-of-type{border-bottom:0}
.d-row input[type="checkbox"]{accent-color:var(--blue);cursor:pointer;margin-top:2px;flex-shrink:0;width:14px;height:14px}
.d-row.done .d-name{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--muted-2);text-decoration-thickness:1px}
.d-name{font-weight:500;color:var(--ink);line-height:1.35}
.d-desc{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.4}
.d-status{font-family:inherit;font-size:11px;padding:3px 7px;border-radius:5px;border:0.5px solid var(--border);background:var(--surface-2);color:var(--ink-2);margin-left:auto;flex-shrink:0;cursor:pointer}
/* ─── stats view ──────────────────────────────────────────── */
.matrix{display:grid;grid-template-columns:1fr 60px 60px 60px;gap:0;font-family:inherit}
.mx-h{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;font-weight:600;padding:0 4px 8px;text-align:center}
.mx-h:first-child{text-align:left}
.mx-row{display:contents}
.mx-row>*{padding:9px 4px;border-top:0.5px dashed var(--border);font-size:12px;display:flex;align-items:center}
.mx-name{justify-content:flex-start;color:var(--ink);font-weight:500;gap:8px}
.mx-name .ph-tag{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mx-cell{justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);position:relative;flex-direction:column;gap:3px;align-items:center;padding:6px 4px}
.mx-bar{width:42px;height:4px;background:var(--surface-2);border-radius:2px;overflow:hidden}
.mx-bar-fill{height:100%;background:var(--phase-color,var(--accent));border-radius:2px;transition:width .4s ease}
.mx-cell.full{color:var(--green-deep);font-weight:600}
[data-theme="dark"] .mx-cell.full{color:var(--green)}
.dist-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.dist-tile{padding:12px 14px;background:var(--surface-2);border-radius:var(--radius-sm);text-align:center}
.dist-num{font-family:'Instrument Serif',serif;font-size:24px;color:var(--ink);line-height:1}
.dist-num em{font-style:italic;color:var(--accent)}
.dist-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:5px;font-weight:500}
.search-input{width:100%;font-family:inherit;font-size:13px;padding:9px 12px;border-radius:8px;border:0.5px solid var(--border);background:var(--surface-2);color:var(--ink);margin-bottom:10px}
.search-input:focus{outline:none;border-color:var(--accent);background:var(--surface)}
.note-result{padding:10px 12px;border:0.5px solid var(--border);border-radius:7px;margin-bottom:6px;background:var(--surface-2);cursor:pointer;transition:all .15s ease}
.note-result:hover{border-color:var(--accent-soft);background:var(--surface)}
.nr-head{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.nr-text{font-size:12px;color:var(--ink-2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.nr-text mark{background:var(--accent-bg);color:var(--accent);padding:0 2px;border-radius:2px;font-weight:500}
/* ─── empty / loading ─────────────────────────────────────── */
.empty{padding:40px 20px;text-align:center;color:var(--muted);font-family:'Instrument Serif',serif;font-size:18px;font-style:italic}
.empty-sub{font-family:'IBM Plex Sans',sans-serif;font-style:normal;font-size:12px;color:var(--muted-2);margin-top:8px}
/* ─── milestone toast ─────────────────────────────────────── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--ink);color:var(--bg);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);opacity:0;transition:all .3s ease;pointer-events:none;z-index:100;max-width:90vw;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast em{font-family:'Instrument Serif',serif;font-style:italic;color:var(--accent)}
[data-theme="dark"] .toast em{color:var(--accent)}
/* ─── responsive ──────────────────────────────────────────── */
@media (max-width:520px){
  .app{padding:14px 12px 60px}
  .brand-title{font-size:22px}
  .hero-greeting{font-size:24px}
  .topic-name{font-size:24px}
  .stat-row{grid-template-columns:1fr 1fr}
  .matrix{grid-template-columns:1fr 48px 48px 48px}
  .mx-bar{width:32px}
  .dist-grid{grid-template-columns:1fr 1fr 1fr}
  .pb-row{gap:5px}
  .conf-btn{width:26px;height:26px}
}
</style>
</head>

      async get(k){try{const r=await window.storage.get(k);return r?r.value:null;}catch{return null;}},
      async set(k,v){try{await window.storage.set(k,v);}catch{}}
    };
  }
  return{
    async get(k){try{return localStorage.getItem(k);}catch{return null;}},
    async set(k,v){try{localStorage.setItem(k,v);}catch{}}
  };
})();
async function sget(key){const v=await STORE.get(key);if(!v)return null;try{return JSON.parse(v);}catch{return null;}}
async function sset(key,val){await STORE.set(key,JSON.stringify(val));}

// ════════════════════════════════════════════════════════════════
// ACTIVITY + SRS
// ════════════════════════════════════════════════════════════════
function isoDay(d){d=d||new Date();const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const dd=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${dd}`;}
function logActivity(){
  const k=isoDay();
  META.activity[k]=(META.activity[k]||0)+1;
  saveMeta();
}
function markVisited(topicId,problemN){
  if(!META.lastVisited[topicId])META.lastVisited[topicId]={};
  META.lastVisited[topicId][problemN]=Date.now();
  saveMeta();
}
function daysSince(ts){if(!ts)return Infinity;return(Date.now()-ts)/(1000*60*60*24);}
// SRS: when is a problem due for review?
function srsInterval(conf){if(conf<=1)return 1;if(conf===2)return 2;if(conf===3)return 4;if(conf===4)return 14;return 30;}
function isDue(topicId,problemN,pState){
  if(pState.redo)return{due:true,reason:'flagged'};
  if(pState.status==='Not Started')return{due:false};
  if(pState.status==='Solved Cleanly'&&pState.conf>=4&&!pState.redo){
    const ts=META.lastVisited[topicId]?.[problemN];
    const d=daysSince(ts);
    const interval=srsInterval(pState.conf);
    return{due:d>=interval,reason:'interval',daysOver:Math.floor(d-interval)};
  }
  if(pState.status==='Review Needed')return{due:true,reason:'review'};
  if(pState.color==='red')return{due:true,reason:'red'};
  if(pState.color==='yellow'&&pState.conf<=2){
    const ts=META.lastVisited[topicId]?.[problemN];
    return{due:daysSince(ts)>=2,reason:'low-conf'};
  }
  return{due:false};
}
function getReviewQueue(){
  const q=[];
  for(const t of TOPICS){
    const st=CACHE[t.id];if(!st)continue;
    for(const p of t.problems){
      const ps=st.problems[p.n];if(!ps)continue;
      const d=isDue(t.id,p.n,ps);
      if(d.due){
        const ts=META.lastVisited[t.id]?.[p.n];
        q.push({topic:t,problem:p,state:ps,reason:d.reason,daysOver:d.daysOver||0,lastTs:ts||0});
      }
    }
  }
  // Sort: flagged > red > review-needed > overdue interval > low-conf
  const order={flagged:0,red:1,review:2,'low-conf':3,interval:4};
  q.sort((a,b)=>{
    if(order[a.reason]!==order[b.reason])return order[a.reason]-order[b.reason];
    return(b.daysOver||0)-(a.daysOver||0);
  });
  return q;
}
function computeStreak(){
  let n=0;const d=new Date();d.setHours(0,0,0,0);
  // If today not logged, allow yesterday to be the start
  if(!META.activity[isoDay(d)])d.setDate(d.getDate()-1);
  while(META.activity[isoDay(d)]>0){n++;d.setDate(d.getDate()-1);}
  return n;
}
function totalSolved(){let n=0;for(const t of TOPICS){const st=CACHE[t.id];if(!st)continue;for(const p of t.problems)if(st.problems[p.n]?.status==='Solved Cleanly')n++;}return n;}
function totalAttempted(){let n=0;for(const t of TOPICS){const st=CACHE[t.id];if(!st)continue;for(const p of t.problems){const s=st.problems[p.n]?.status;if(s&&s!=='Not Started')n++;}}return n;}
function totalProblems(){return TOPICS.reduce((s,t)=>s+t.problems.length,0);}
function totalConceptsLearned(){let n=0,tot=0;for(const t of TOPICS){const st=CACHE[t.id];if(!st)continue;for(const i in st.concepts){tot++;if(st.concepts[i])n++;}}return{n,tot};}
function totalDesignLearned(){let n=0,tot=0;for(const t of TOPICS){const st=CACHE[t.id];if(!st)continue;for(const i in st.design){tot++;if(st.design[i]?.checked)n++;}}return{n,tot};}
function totalMinutes(){let m=0;for(const t of TOPICS){const st=CACHE[t.id];if(!st)continue;for(const p of t.problems){const v=parseInt(st.problems[p.n]?.time);if(v)m+=v;}}return m;}
function avgTimeByDiff(){const tot={E:[0,0],M:[0,0],H:[0,0]};for(const t of TOPICS){const st=CACHE[t.id];if(!st)continue;for(const p of t.problems){const v=parseInt(st.problems[p.n]?.time);if(v){tot[p.diff][0]+=v;tot[p.diff][1]++;}}}return{E:tot.E[1]?Math.round(tot.E[0]/tot.E[1]):0,M:tot.M[1]?Math.round(tot.M[0]/tot.M[1]):0,H:tot.H[1]?Math.round(tot.H[0]/tot.H[1]):0};}
function diffDistribution(){const r={E:[0,0],M:[0,0],H:[0,0]};for(const t of TOPICS){const st=CACHE[t.id];if(!st)continue;for(const p of t.problems){r[p.diff][1]++;if(st.problems[p.n]?.status==='Solved Cleanly')r[p.diff][0]++;}}return r;}
function topicProgress(t){
  const st=CACHE[t.id];if(!st)return{cP:0,tP:1,cC:0,tC:1,cD:0,tD:1,cleanP:0};
  const tP=t.problems.length;
  const cleanP=t.problems.filter(p=>st.problems[p.n]?.status==='Solved Cleanly').length;
  const cP=t.problems.filter(p=>{const s=st.problems[p.n]?.status;return s&&s!=='Not Started';}).length;
  const tC=t.concepts.length;const cC=t.concepts.filter((_,i)=>st.concepts[i]).length;
  const tD=t.design.length;const cD=t.design.filter((_,i)=>st.design[i]?.checked).length;
  return{cP,tP,cC,tC,cD,tD,cleanP};
}

function patchProblem(topicId,n,obj){
  const isNotesOnly=Object.keys(obj).length===1&&'notes' in obj;
  const before=JSON.stringify(CACHE[topicId].problems[n]);
  CACHE[topicId].problems[n]={...CACHE[topicId].problems[n],...obj};
  const after=JSON.stringify(CACHE[topicId].problems[n]);
  if(before!==after&&!isNotesOnly){logActivity();markVisited(topicId,n);checkMilestones(topicId,n,obj);}
  saveTopic(topicId);
  if(!isNotesOnly)render();
}
function patchConcept(topicId,i,v){
  CACHE[topicId].concepts[i]=v;
  if(v)logActivity();
  saveTopic(topicId);render();
}
function patchDesign(topicId,i,obj){
  CACHE[topicId].design[i]={...CACHE[topicId].design[i],...obj};
  if(obj.checked)logActivity();
  saveTopic(topicId);render();
}
function patchTopic(topicId,obj){
  const keys=Object.keys(obj);
  const isNotesOnly=keys.length>0&&keys.every(k=>k==='conceptNotes'||k==='designNotes'||k==='notes');
  CACHE[topicId]={...CACHE[topicId],...obj};
  saveTopic(topicId);
  if(!isNotesOnly)render();
}

// Milestones
function checkMilestones(topicId,n,obj){
  if(obj.status==='Solved Cleanly'){
    const total=totalSolved();
    const milestones=[1,5,10,25,50,75,100,150,200];
    if(milestones.includes(total)&&!META.celebrated['solved_'+total]){
      META.celebrated['solved_'+total]=true;saveMeta();
      const phrases={1:'first one — beginnings',5:'five solved',10:'double digits',25:'a quarter century',50:'half a hundred',75:'seventy-five',100:'a century',150:'a hundred and fifty',200:'two hundred'};
      showToast(`<em>${phrases[total]||total}</em> · keep going.`);
    }
    // Topic complete?
    const topic=TOPICS.find(t=>t.id===topicId);
    const prog=topicProgress(topic);
    if(prog.cleanP===prog.tP&&!META.celebrated['topic_'+topicId]){
      META.celebrated['topic_'+topicId]=true;saveMeta();
      showToast(`<em>${topic.name}</em> · all problems solved cleanly.`);
    }
  }
  // Streak milestones
  const streak=computeStreak();
  if([7,14,30,60,100].includes(streak)&&!META.celebrated['streak_'+streak]){
    META.celebrated['streak_'+streak]=true;saveMeta();
    showToast(`<em>${streak}-day streak</em> · sustained focus.`);
  }
}
let toastTimer;
function showToast(html){
  const t=document.getElementById('toast');t.innerHTML='✦ '+html;
  t.classList.add('show');clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),3500);
}

function exportData(){
  const d={meta:META,topics:CACHE,exportedAt:new Date().toISOString(),version:1};
  const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`prep-tracker-${isoDay()}.json`;a.click();
  URL.revokeObjectURL(url);
  showToast(`<em>exported</em> · ${isoDay()}`);
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='application/json';
  inp.onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    try{
      const txt=await f.text();const d=JSON.parse(txt);
      if(d.meta)META={...META,...d.meta};
      if(d.topics){for(const id in d.topics){if(CACHE[id])CACHE[id]={...CACHE[id],...d.topics[id]};}}
      saveMeta();for(const id in CACHE)await sset(TOPIC_KEY(id),CACHE[id]);
      document.documentElement.setAttribute('data-theme',META.theme);
      showToast('<em>imported</em> · progress restored.');
      render();
    }catch{showToast('<em>import failed</em> · invalid file.');}
  };inp.click();
}

    const inPhase=TOPICS.filter(t=>t.phase===phase);
    const color=PHASE_COLORS[phase];
    html+=`<div class="phase-group" style="--phase-color:${color}">
      <div class="phase-group-label">${phase}</div>
      <div class="phase-dots">`;
    for(const t of inPhase){
      const prog=topicProgress(t);
      const frac=prog.tP?prog.cleanP/prog.tP:0;
      let cls='';
      if(t.id===CT)cls='current';
      else if(frac===1)cls='done';
      else if(frac>0||prog.cC>0)cls='partial';
      html+=`<button class="tdot ${cls}" style="--frac:${Math.max(0.4,frac)}" onclick="setTopic(${t.id})" title="${t.id}. ${escapeHtml(t.name)} · ${prog.cleanP}/${prog.tP}">${t.id}</button>`;
    }
    html+=`</div></div>`;
  }
  html+='</div>';
  return html;
}
function renderTopicView(){
  const topic=TOPICS[CT-1];
  const st=CACHE[CT];
  const prog=topicProgress(topic);
  const phaseColor=PHASE_COLORS[topic.phase];
  const pct=prog.tP?Math.round(100*prog.cleanP/prog.tP):0;

  const counts={all:topic.problems.length,todo:0,prog:0,solved:0,review:0,red:0};
  topic.problems.forEach(p=>{
    const ps=st.problems[p.n];if(!ps)return;
    if(ps.status==='Not Started')counts.todo++;
    else if(ps.status==='In Progress'||ps.status==='Solved with Hints')counts.prog++;
    else if(ps.status==='Solved Cleanly')counts.solved++;
    if(isDue(CT,p.n,ps).due)counts.review++;
    if(ps.color==='red')counts.red++;
  });

  const filtered=topic.problems.filter(p=>{
    const ps=st.problems[p.n];
    if(FILTER==='all')return true;
    if(FILTER==='todo')return ps.status==='Not Started';
    if(FILTER==='prog')return ps.status==='In Progress'||ps.status==='Solved with Hints';
    if(FILTER==='solved')return ps.status==='Solved Cleanly';
    if(FILTER==='review')return isDue(CT,p.n,ps).due;
    if(FILTER==='red')return ps.color==='red';
    return true;
  });

  return`
    ${renderPhaseNav()}
    <div class="card topic-header" style="--phase-color:${phaseColor}">
      <div class="topic-header-top">
        <span class="pill" style="background:${phaseColor}22;color:${phaseColor}">${topic.phase}</span>
        <span class="pill">Topic ${topic.id} of ${TOPICS.length}</span>
        <div class="topic-arrows" style="margin-left:auto">
          <button class="icon-btn" onclick="setTopic(${CT-1})" ${CT===1?'disabled style="opacity:0.3;cursor:not-allowed"':''}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M15 6l-6 6 6 6"/></svg>
          </button>
          <button class="icon-btn" onclick="setTopic(${CT+1})" ${CT===TOPICS.length?'disabled style="opacity:0.3;cursor:not-allowed"':''}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
          </button>
        </div>
      </div>
      <div class="topic-name">${escapeHtml(topic.name)}</div>
      <div class="topic-intro">${escapeHtml(topic.intro)}</div>
      <div class="topic-meta-row">
        <div class="topic-progress">
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${phaseColor}"></div></div>
          <span class="progress-text">${prog.cleanP}/${prog.tP} · ${pct}%</span>
        </div>
      </div>
    </div>

    ${renderConcepts(topic,st)}
    ${renderProblems(topic,st,counts,filtered,phaseColor)}
    ${renderDesign(topic,st)}
  `;
}
function renderConcepts(topic,st){
  const k='concepts';
  const rows=topic.concepts.map((c,i)=>{
    const done=st.concepts[i];
    return`<div class="concept-row${done?' done':''}">
      <input type="checkbox" ${done?'checked':''} onchange="patchConcept(${CT},${i},this.checked)">
      <div class="concept-body">
        <div class="c-name">${escapeHtml(c.name)}</div>
        <div class="c-desc">${escapeHtml(c.desc)}</div>
      </div>
    </div>`;
  }).join('');
  const learned=topic.concepts.filter((_,i)=>st.concepts[i]).length;
  return`<div class="card card-pad" style="margin-top:12px">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
      <div class="card-title">Concepts <em>to learn</em></div>
      <span class="pill ${learned===topic.concepts.length?'pill-green':''}">${learned}/${topic.concepts.length}</span>
    </div>
    <div class="concept-list">${rows}</div>
    <button class="notes-toggle" onclick="toggleExp('${k}')" style="margin-top:8px">${EXP[k]?'▼':'▶'} Concept notes</button>
    ${EXP[k]?`<textarea class="notes" placeholder="What clicked · Mental models · Things I keep forgetting · Questions to revisit..." oninput="patchTopic(${CT},{conceptNotes:this.value})">${escapeHtml(st.conceptNotes||'')}</textarea>`:''}
  </div>`;
}
function renderProblems(topic,st,counts,filtered,phaseColor){
  const filters=[
    ['all','All',counts.all],
    ['todo','Todo',counts.todo],
    ['prog','In progress',counts.prog],
    ['solved','Solved',counts.solved],
    ['review','Due review',counts.review],
    ['red','Red',counts.red]
  ];
  return`<div class="card card-pad problems-section" style="margin-top:12px">
    <div class="problems-head">
      <h3>Problems</h3>
      <span class="pmeta">${filtered.length} shown · ${counts.solved}/${counts.all} clean</span>
    </div>
    <div class="filter-bar">
      ${filters.map(([k,lbl,n])=>`<button class="fchip${FILTER===k?' active':''}" onclick="FILTER='${k}';render()">${lbl}<span class="fchip-count">${n}</span></button>`).join('')}
    </div>
    <div>
      ${filtered.length===0
        ?`<div class="empty">Nothing here.<div class="empty-sub">Try a different filter.</div></div>`
        :filtered.map(p=>renderProblemCard(p,st)).join('')
      }
    </div>
  </div>`;
}
function renderProblemCard(p,st){
  const s=st.problems[p.n];
  const k=`p${p.n}`;
  const open=!!EXP[k];
  const colCls=s.color==='green'?'col-green':s.color==='yellow'?'col-yellow':s.color==='red'?'col-red':'';
  const stCls={'In Progress':'s-prog','Solved with Hints':'s-hint','Solved Cleanly':'s-clean','Review Needed':'s-rev'}[s.status]||'';
  const due=isDue(CT,p.n,s);
  return`<div class="pcard ${colCls}${due.due?' due':''}${open?' open':''}">
    <div class="pcard-row" onclick="toggleExp('${k}')">
      <span class="p-num">#${p.n}</span>
      <span class="p-name${s.status==='Solved Cleanly'?' solved':''}">${escapeHtml(p.name)}${p.prem?'<span class="prem-pill">PREM</span>':''}</span>
      <div class="p-tags">
        ${due.due?'<span class="due-flag">due</span>':''}
        <span class="status-dot ${stCls}" title="${s.status}"></span>
        <span class="diff-badge diff-${p.diff}">${p.diff}</span>
        <svg class="expand-i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
      </div>
    </div>
    ${open?renderProblemBody(p,s,k):''}
  </div>`;
}
function renderProblemBody(p,s,k){
  return`<div class="pcard-body">
    <div class="pb-links">
      <a class="link-btn" href="${p.lc}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        LeetCode
      </a>
      ${p.nc?`<a class="link-btn" href="${p.nc}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        NeetCode
      </a>`:''}
    </div>
    <div class="pb-row">
      <label>Status</label>
      <select class="ctrl" onchange="patchProblem(${CT},${p.n},{status:this.value})">
        ${['Not Started','In Progress','Solved with Hints','Solved Cleanly','Review Needed'].map(v=>`<option${s.status===v?' selected':''}>${v}</option>`).join('')}
      </select>
    </div>
    <div class="pb-row">
      <label>Vibe</label>
      <div class="color-grp">
        ${[['green','🟢','Got it'],['yellow','🟡','Shaky'],['red','🔴','Stuck']].map(([c,e,lbl])=>`<button class="color-btn${s.color===c?' act-'+c:''}" onclick="patchProblem(${CT},${p.n},{color:${s.color===c?'null':"'"+c+"'"}})">${e} <span style="font-size:11px">${lbl}</span></button>`).join('')}
      </div>
    </div>
    <div class="pb-row">
      <label>Conf</label>
      <div class="conf-grp">
        ${[1,2,3,4,5].map(i=>`<button class="conf-btn${i<=s.conf?' act':''}" onclick="patchProblem(${CT},${p.n},{conf:${s.conf===i?0:i}})">${i}</button>`).join('')}
      </div>
      <input class="time-input" type="number" placeholder="min" value="${s.time||''}" onchange="patchProblem(${CT},${p.n},{time:this.value})">
      <span style="font-size:11px;color:var(--muted)">min</span>
    </div>
    <div class="cb-grp">
      <label class="cb-row"><input type="checkbox" ${s.timed?'checked':''} onchange="patchProblem(${CT},${p.n},{timed:this.checked})"> Timed</label>
      <label class="cb-row"><input type="checkbox" ${s.explain?'checked':''} onchange="patchProblem(${CT},${p.n},{explain:this.checked})"> Can explain</label>
      <label class="cb-row"><input type="checkbox" ${s.redo?'checked':''} onchange="patchProblem(${CT},${p.n},{redo:this.checked})"> Need redo</label>
    </div>
    <button class="notes-toggle" onclick="toggleExp('${k}-n')">${EXP[k+'-n']?'▼':'▶'} Problem notes</button>
    ${EXP[k+'-n']?`<textarea class="notes" placeholder="My approach · Why it worked/failed · Key insight · What to remember next time..." oninput="patchProblem(${CT},${p.n},{notes:this.value})">${escapeHtml(s.notes||'')}</textarea>`:''}
  </div>`;
}
function renderDesign(topic,st){
  const k='design';
  const rows=topic.design.map((d,i)=>{
    const ds=st.design[i]||{checked:false,status:'Not Started'};
    return`<div class="d-row${ds.checked?' done':''}">
      <input type="checkbox" ${ds.checked?'checked':''} onchange="patchDesign(${CT},${i},{checked:this.checked})">
      <div class="concept-body">
        <div class="d-name">${escapeHtml(d.name)}</div>
        <div class="d-desc">${escapeHtml(d.desc)}</div>
      </div>
      <select class="d-status" onchange="patchDesign(${CT},${i},{status:this.value})">
        ${['Not Started','In Progress','Understood','Needs Review'].map(v=>`<option${ds.status===v?' selected':''}>${v}</option>`).join('')}
      </select>
    </div>`;
  }).join('');
  const learned=topic.design.filter((_,i)=>st.design[i]?.checked).length;
  return`<div class="card dcard" style="margin-top:12px;border-left:2.5px solid var(--blue)">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px">
      <h3>System <em>design</em></h3>
      <span class="pill pill-blue">${learned}/${topic.design.length}</span>
    </div>
    <div class="dcard-sub">Paired concepts that come up at the same level of abstraction</div>
    ${rows}
    <button class="notes-toggle" onclick="toggleExp('${k}')" style="margin-top:8px">${EXP[k]?'▼':'▶'} Design notes</button>
    ${EXP[k]?`<textarea class="notes" placeholder="Definition in my own words · Tradeoffs · Real product example · What's still fuzzy..." oninput="patchTopic(${CT},{designNotes:this.value})">${escapeHtml(st.designNotes||'')}</textarea>`:''}
  </div>`;
}

// ── Stats view ──────────────────────────────────────────────────
function renderStats(){
  const totalP=totalProblems();
  const solved=totalSolved();
  const attempted=totalAttempted();
  const concepts=totalConceptsLearned();
  const design=totalDesignLearned();
  const minutes=totalMinutes();
  const hours=Math.floor(minutes/60);
  const mins=minutes%60;
  const avgT=avgTimeByDiff();
  const dist=diffDistribution();
  const pctAttempted=totalP?Math.round(100*attempted/totalP):0;
  const pctSolved=totalP?Math.round(100*solved/totalP):0;

  // Mastery matrix
  const matrixRows=TOPICS.map(t=>{
    const p=topicProgress(t);
    const color=PHASE_COLORS[t.phase];
    const pPct=p.tP?Math.round(100*p.cleanP/p.tP):0;
    const cPct=p.tC?Math.round(100*p.cC/p.tC):0;
    const dPct=p.tD?Math.round(100*p.cD/p.tD):0;
    const cell=(pct,n,total)=>`<div class="mx-cell ${pct===100?'full':''}">
      <div>${n}/${total}</div>
      <div class="mx-bar"><div class="mx-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
    return`<div class="mx-row" onclick="setTopic(${t.id})" style="cursor:pointer">
      <div class="mx-name"><span class="ph-tag" style="background:${color}"></span>${escapeHtml(t.name)}</div>
      ${cell(cPct,p.cC,p.tC)}
      ${cell(pPct,p.cleanP,p.tP)}
      ${cell(dPct,p.cD,p.tD)}
    </div>`;
  }).join('');

  return`
    <div class="hero">
      <div class="hero-greeting">The <em>data</em>.</div>
      <div class="hero-line">A complete view of where you are. Click any topic row to jump in.</div>
    </div>

    <div class="stat-row" style="margin-top:12px">
      <div class="stat-tile">
        <div class="stat-num">${pctSolved}<em>%</em></div>
        <div class="stat-label">Roadmap solved</div>
        <div class="stat-trend">${solved} of ${totalP} problems</div>
      </div>
      <div class="stat-tile">
        <div class="stat-num">${pctAttempted}<em>%</em></div>
        <div class="stat-label">Attempted</div>
        <div class="stat-trend">${attempted} of ${totalP}</div>
      </div>
      <div class="stat-tile">
        <div class="stat-num">${hours}<em>h ${mins}m</em></div>
        <div class="stat-label">Time logged</div>
        <div class="stat-trend">across all problems</div>
      </div>
      <div class="stat-tile">
        <div class="stat-num">${concepts.n}<em>/${concepts.tot}</em></div>
        <div class="stat-label">Concepts</div>
        <div class="stat-trend">+ ${design.n}/${design.tot} design</div>
      </div>
    </div>

    <div class="card card-pad" style="margin-top:14px">
      <div class="card-title" style="margin-bottom:4px">Mastery <em>matrix</em></div>
      <div class="card-sub">Concepts · Problems · Design — by topic</div>
      <div class="matrix">
        <div class="mx-h">Topic</div>
        <div class="mx-h">Concepts</div>
        <div class="mx-h">Problems</div>
        <div class="mx-h">Design</div>
        ${matrixRows}
      </div>
    </div>

    <div class="card card-pad" style="margin-top:12px">
      <div class="card-title" style="margin-bottom:10px">Difficulty <em>distribution</em></div>
      <div class="dist-grid">
        ${[['E','Easy',dist.E,avgT.E],['M','Medium',dist.M,avgT.M],['H','Hard',dist.H,avgT.H]].map(([d,lbl,arr,avg])=>{
          const pct=arr[1]?Math.round(100*arr[0]/arr[1]):0;
          return`<div class="dist-tile">
            <div class="dist-num">${arr[0]}<em>/${arr[1]}</em></div>
            <div class="dist-lbl">${lbl}</div>
            <div style="margin-top:8px;height:3px;background:var(--surface);border-radius:2px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:var(--accent)"></div>
            </div>
            ${avg?`<div style="font-size:10px;color:var(--muted);margin-top:6px;font-family:'IBM Plex Mono',monospace">avg ${avg}m</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="card card-pad" style="margin-top:12px">
      <div class="card-title" style="margin-bottom:10px">Search <em>notes</em></div>
      <input class="search-input" id="srcInput" type="text" placeholder="Search across all your problem & concept notes..." value="${escapeHtml(SEARCH)}" oninput="updateSearch(this.value)">
      <div id="srcResults">${renderNoteResults()}</div>
    </div>
  `;
}
function renderNoteResults(){
  if(!SEARCH||SEARCH.length<2)return`<div style="text-align:center;color:var(--muted);font-size:12px;padding:20px;font-style:italic;font-family:'Instrument Serif',serif;font-size:15px">Type to search.</div>`;
  const q=SEARCH.toLowerCase();
  const results=[];
  for(const t of TOPICS){
    const st=CACHE[t.id];if(!st)continue;
    if(st.conceptNotes?.toLowerCase().includes(q))results.push({topic:t,kind:'Concepts',text:st.conceptNotes,jump:t.id});
    if(st.designNotes?.toLowerCase().includes(q))results.push({topic:t,kind:'Design',text:st.designNotes,jump:t.id});
    for(const p of t.problems){
      const ps=st.problems[p.n];
      if(ps?.notes?.toLowerCase().includes(q))results.push({topic:t,kind:`#${p.n} ${p.name}`,text:ps.notes,jump:t.id,problem:p});
    }
  }
  if(results.length===0)return`<div style="text-align:center;color:var(--muted);font-size:13px;padding:16px">No matches for "${escapeHtml(SEARCH)}"</div>`;
  const re=new RegExp(`(${SEARCH.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
  return results.slice(0,20).map(r=>{
    const idx=r.text.toLowerCase().indexOf(q);
    const start=Math.max(0,idx-50);const end=Math.min(r.text.length,idx+150);
    let snippet=(start>0?'…':'')+r.text.slice(start,end)+(end<r.text.length?'…':'');
    snippet=escapeHtml(snippet).replace(re,'<mark>$1</mark>');
    return`<div class="note-result" onclick="setTopic(${r.jump})">
      <div class="nr-head"><span>${escapeHtml(r.topic.name)} · ${escapeHtml(r.kind)}</span><span style="opacity:0.7">jump →</span></div>
      <div class="nr-text">${snippet}</div>
    </div>`;
  }).join('')+(results.length>20?`<div style="text-align:center;font-size:11px;color:var(--muted);padding-top:6px;font-family:'IBM Plex Mono',monospace">+ ${results.length-20} more</div>`:'');
}

// ── Master render ──────────────────────────────────────────────
function render(){
  if(!META){$('#root').innerHTML='<div class="empty">Loading.<div class="empty-sub">Restoring your progress.</div></div>';return;}
  let body='';
  if(TAB==='today')body=renderToday();
  else if(TAB==='topic')body=renderTopicView();
  else if(TAB==='stats')body=renderStats();
  $('#root').innerHTML=renderTopbar()+renderTabs()+body;
}

// ── Init ────────────────────────────────────────────────────────
loadAll().then(render).catch(e=>{
  console.error(e);
  $('#root').innerHTML='<div class="empty">Something broke.<div class="empty-sub">Refresh the page; your data is safe.</div></div>';
});
</script>
</body>
